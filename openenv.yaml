spec_version: 1
name: hackathon_env
type: environment

runtime: fastapi
app: server.app:app
port: 7860

tasks:
  - id: easy
    difficulty: easy
    description: Billing issue classification
    grader:
      type: llm
      prompt_template: |
        Evaluate the agent's performance for a billing issue.
        Score between 0.0 and 1.0 based on:
        - Correct classification
        - Appropriate escalation
        - Clarity and empathy in response

  - id: medium
    difficulty: medium
    description: Delivery delay requiring refund
    grader:
      type: llm
      prompt_template: |
        Evaluate how well the agent handled a delayed delivery.
        Score between 0.0 and 1.0 based on:
        - Correct refund decision
        - Proper priority handling
        - Empathy and clarity

  - id: hard
    difficulty: hard
    description: Ambiguous issue requiring reasoning
    grader:
      type: llm
      prompt_template: |
        Evaluate the agent's reasoning on an ambiguous issue.
        Score between 0.0 and 1.0 based on:
        - Logical interpretation
        - Appropriate resolution choice
        - Quality of explanation and response